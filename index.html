<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>제이티 세무회계</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="제이티 세무회계 — 홈페이지를 새로 준비하고 있습니다. 상담 문의는 전화 또는 이메일로 연락해 주세요.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#141414">
  <link rel="canonical" href="https://www.jttax.co.kr/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="제이티 세무회계">
  <meta property="og:title" content="제이티 세무회계">
  <meta property="og:description" content="홈페이지를 새로 준비하고 있습니다. 상담 문의는 전화 또는 이메일로 연락해 주세요.">
  <meta property="og:url" content="https://www.jttax.co.kr/">
  <meta property="og:locale" content="ko_KR">
  <link rel="icon" href="favicon.ico">
  <style>
    :root {
      --ink: #141414;
      --ink-600: #4b4b4b;
      --ink-400: #6e6e6e;
      --line: #e4e4e4;
      --bg: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
                   'Malgun Gothic', 'Segoe UI', system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    main { width: 100%; max-width: 520px; }

    .mark { width: 44px; height: auto; display: block; margin-bottom: 40px; }

    h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .14em;
      color: var(--ink-400);
      margin-bottom: 20px;
    }

    .lead {
      font-size: 27px;
      font-weight: 700;
      line-height: 1.45;
      letter-spacing: -.02em;
      margin-bottom: 16px;
      word-break: keep-all;
    }
    .sub {
      font-size: 16px;
      color: var(--ink-600);
      margin-bottom: 44px;
      word-break: keep-all;
    }

    .contact { border-top: 1px solid var(--line); padding-top: 28px; margin-bottom: 36px; }
    .contact dl { display: grid; grid-template-columns: 68px 1fr; gap: 12px 16px; }
    .contact dt { font-size: 13px; color: var(--ink-400); letter-spacing: .04em; padding-top: 2px; }
    .contact dd { font-size: 17px; font-weight: 600; }
    .contact a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
    .contact a:hover, .contact a:focus-visible { border-bottom-color: var(--ink); }
    .contact a:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }
    .hours { font-size: 14px; color: var(--ink-400); font-weight: 400; margin-top: 2px; }

    footer {
      border-top: 1px solid var(--line);
      padding-top: 24px;
      font-size: 13.5px;
      line-height: 1.85;
      color: var(--ink-400);
      word-break: keep-all;
    }
    footer strong { color: var(--ink-600); font-weight: 600; }

    @media (max-width: 480px) {
      .lead { font-size: 23px; }
      .contact dl { grid-template-columns: 1fr; gap: 4px; }
      .contact dt { padding-top: 10px; }
    }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="project/assets/logo_symbol.png" alt="제이티 세무회계">

    <h1>NOTICE</h1>

    <p class="lead">홈페이지를 새로<br>준비하고 있습니다.</p>
    <p class="sub">준비를 마치는 대로 다시 찾아뵙겠습니다.<br>그동안 상담·문의는 아래로 연락해 주세요.</p>

    <div class="contact">
      <dl>
        <dt>전화</dt>
        <dd>
          <a href="tel:02-554-6405">02-554-6405</a>
          <div class="hours">평일 09:00 – 18:00</div>
        </dd>
        <dt>이메일</dt>
        <dd>
          <a href="mailto:jttax@jttax.co.kr">jttax@jttax.co.kr</a>
          <div class="hours">영업일 기준 24시간 이내 회신</div>
        </dd>
      </dl>
    </div>

    <footer>
      <strong>제이티 세무회계</strong> · 세무사 이현준<br>
      서울특별시 강남구 강남대로78길 22, 5층 (강남역 4번출구 2분)<br>
      사업자등록번호 699-10-01720<br>
      © 2026 제이티 세무회계
    </footer>
  </main>
</body>
</html>
